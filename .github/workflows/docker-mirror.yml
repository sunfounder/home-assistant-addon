name: Mirror Docker Images to ghcr.io

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to mirror (comma-separated)'
        required: true
        default: 'aarch64-pironman5:1.2.12,aarch64-pironman5-max:1.3.6.1,aarch64-pi-config-wizard:1.0.3'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Mirror images
        run: |
          set -euo pipefail
          IFS=',' read -ra IMGS <<< "${{ github.event.inputs.images }}"
          for img in "${IMGS[@]}"; do
            img=$(echo "$img" | xargs)
            [ -z "$img" ] && continue
            echo "=== Pulling sunfounder/$img ==="
            docker pull --platform linux/arm64 "sunfounder/$img"
            echo "=== Tagging ghcr.io/sunfounder/$img ==="
            docker tag "sunfounder/$img" "ghcr.io/sunfounder/$img"
            echo "=== Pushing ==="
            docker push "ghcr.io/sunfounder/$img"
            echo "OK"
          done
